schema_version = 1

[category]
slug  = "data_analytics"
order = 1

[agent]
slug        = "watchlist"
name        = "Watchlist"
description = "Track markets you care about — streams live prices and orderbook depth for a configurable list of pairs. Read-only, no ledger writes."
icon        = "eye"
status      = "active"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=watchlist"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Watchlist v1"
language = "rust"
order    = 1
tags     = ["read-only", "market-data"]

[template.resources]
docs       = "https://docs.silvana.one/agents/watchlist/v1-rust"
demo       = "https://docs.silvana.one/agents/watchlist/v1-rust/quickstart"
