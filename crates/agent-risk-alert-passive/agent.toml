schema_version = 1

[category]
slug  = "risk"
order = 2

[agent]
slug        = "risk-alert"
name        = "Risk Alert"
description = "Passive risk monitor — polls orderbook state and fires alerts when thresholds (open orders, failed settlements, notional caps) are breached. Does not cancel anything."
icon        = "bell-ring"
status      = "active"

required_balance   = "None — read-only"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=risk-alert"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Passive"
language = "rust"
order    = 1
tags     = ["alerts", "monitoring"]
demo     = "https://silvana.one/agents/demo/risk-alert-passive/"
demo_type = "basic"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-risk-alert-passive/doc.md"
