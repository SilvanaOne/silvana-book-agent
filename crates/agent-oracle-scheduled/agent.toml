schema_version = 1

[category]
slug  = "data_analytics"
order = 3

[agent]
slug        = "oracle"
name        = "Oracle"
description = "Scheduled price publisher — polls GetPrice for every configured market on a fixed cadence and emits one record per market per poll to stdout, JSONL file, or webhook."
icon        = "radio-tower"
status      = "active"

required_balance   = "None — read-only"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=oracle"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Scheduled"
language = "rust"
order    = 1
tags     = ["price-feed", "scheduled"]

[template.resources]
docs       = "https://docs.silvana.one/agents/oracle/scheduled-rust"
demo       = "https://silvana.one/agents/demo/oracle-scheduled/"
