schema_version = 1

[category]
slug  = "trading"
order = 13

[agent]
slug        = "hedging"
name        = "Hedging"
description = "Pushes the balance of a target instrument back toward a configured level by placing counter-directional orders sized against the deviation."
icon        = "scale"
status      = "active"

required_balance   = "$200 min"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=hedging"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Hedging v1"
language = "rust"
order    = 1
tags     = ["hedging", "exposure"]

[template.resources]
docs       = "https://docs.silvana.one/agents/hedging/v1-rust"
demo       = "https://silvana.one/agents/demo/hedging/"
