schema_version = 1

[category]
slug  = "portfolio_mgmt"
order = 5

[agent]
slug        = "smart-allocation"
name        = "Smart Allocation"
description = "Rule-based two-level bucket portfolio — assets grouped into themed buckets with per-bucket target weights and dynamic sub-allocation between instruments."
icon        = "sparkles"
status      = "active"

required_balance   = "$1000 min"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=smart-allocation"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Smart Allocation v1"
language = "rust"
order    = 1
tags     = ["allocation", "buckets", "themes"]

[template.resources]
docs       = "https://docs.silvana.one/agents/smart-allocation/v1-rust"
quickstart = "https://silvana.one/agents/demo/smart-allocation/"
