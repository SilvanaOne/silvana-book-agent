schema_version = 1

[category]
slug  = "tx_flow"
order = 7

[agent]
slug        = "witnesses"
name        = "Witnesses"
description = "Subscribes to own orders + settlements and spawns a configurable shell command per matched event kind — event context passes to the child via env vars."
icon        = "webhook"
status      = "active"

required_balance   = "None — read-only"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=witnesses"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Witnesses v1"
language = "rust"
order    = 1
tags     = ["events", "shell", "witness"]

[template.resources]
docs       = "https://docs.silvana.one/agents/witnesses/v1-rust"
quickstart = "https://docs.silvana.one/agents/witnesses/v1-rust/quickstart"
