schema_version = 1

[category]
slug  = "risk"
order = 1

[agent]
slug        = "killswitch"
name        = "Killswitch"
description = "Emergency stop — instantly cancels every open order on demand, or trips automatically when health checks (open-order count, failed settlements) breach configured limits."
icon        = "power-off"
status      = "active"

required_balance   = "None — read-only"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=killswitch"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Panic"
language = "rust"
order    = 1
tags     = ["emergency-stop", "cancel-all"]
demo     = "https://silvana.one/agents/demo/killswitch-panic/"
demo_type = "basic"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-killswitch-panic/doc.md"
