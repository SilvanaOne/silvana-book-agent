schema_version = 1

[category]
slug  = "trading"
order = 3

[agent]
slug        = "copy-trading"
name        = "Copy Trading"
description = "Mirror a leader party's order flow onto your own book. Every leader `order.created` becomes a scaled mirror trade — filtered by market and capped by per-trade notional. Read-only observation of the leader; two-phase signing only on your own side."
icon        = "users"
status      = "active"

required_balance   = "$100 min"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=copy-trading"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Proportional"
language = "rust"
order    = 2
tags     = ["copy-trading", "proportional", "leader-follower"]
demo     = "https://silvana.one/agents/demo/copy-trading-proportional/"
demo_type = "basic"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-copy-trading-proportional/doc.md"
