schema_version = 1

[category]
slug  = "trading"
order = 16

[agent]
slug        = "trend-following"
name        = "Trend Following"
description = "EMA-crossover momentum trader — fast crosses slow → bid entry, fast below slow → offer. Won't stack orders in the current signal direction."
icon        = "trending-up"
status      = "active"

required_balance   = "$200 min"
supported_assets   = "CC, USDC"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=trend-following"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Trend Following v1"
language = "rust"
order    = 1
tags     = ["momentum", "ema", "crossover"]

[template.resources]
docs       = "https://docs.silvana.one/agents/trend-following/v1-rust"
quickstart = "https://docs.silvana.one/agents/trend-following/v1-rust/quickstart"
