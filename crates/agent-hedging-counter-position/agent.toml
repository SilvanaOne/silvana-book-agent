schema_version = 1

[category]
slug  = "trading"
order = 13

[agent]
slug        = "hedging"
name        = "Hedging"
description = "Pushes the balance of a target instrument back toward a configured level by placing counter-directional orders sized against the deviation."
icon        = "scale"
status      = "active"

required_balance   = "$200 min"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=hedging"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Counter-Position"
language = "rust"
order    = 1
tags     = ["hedging", "exposure"]
demo     = "https://silvana.one/agents/demo/hedging-counter-position/"
demo_type = "basic"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-hedging-counter-position/doc.md"
