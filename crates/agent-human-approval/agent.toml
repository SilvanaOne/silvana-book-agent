[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Human Approval v1"
language = "rust"
order    = 1
tags     = ["approval", "queue", "manual"]

[template.resources]
docs       = "https://docs.silvana.one/agents/human-approval/v1-rust"
quickstart = "https://silvana.one/agents/demo/human-approval/"
