schema_version = 1

[category]
slug  = "intelligence"
order = 2

[agent]
slug        = "news-sentiment"
name        = "News Sentiment"
description = "Consumes a stream of news headlines, scores sentiment on a lexicon, and emits a market-tagged signal for headlines whose |sentiment| clears the threshold AND that mention a configured market alias."
icon        = "newspaper"
status      = "active"

required_balance   = "None — signal-generation only"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=news-sentiment"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "News Sentiment v1"
language = "rust"
order    = 1
tags     = ["news", "sentiment", "nlp"]

[template.resources]
docs       = "https://docs.silvana.one/agents/news-sentiment/v1-rust"
demo       = "https://silvana.one/agents/demo/news-sentiment/"
