schema_version = 1

[category]
slug  = "portfolio_mgmt"
order = 4

[agent]
slug        = "batch-orders"
name        = "Batch Orders"
description = "One-shot bulk-order CLI — submit orders from a JSONL file, cancel filtered subsets by market or side, or cancel every open order in a single call."
icon        = "layers"
status      = "active"

required_balance   = "$100 min"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=batch-orders"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Bulk CLI"
language = "rust"
order    = 1
tags     = ["batch", "bulk", "cli"]
demo     = "https://silvana.one/agents/demo/batch-orders-bulk-cli/"
demo_type = "basic"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-batch-orders-bulk-cli/doc.md"
