schema_version = 1

[category]
slug  = "tx_flow"
order = 5

[agent]
slug        = "failure-recovery"
name        = "Failure Recovery"
description = "Watchdog for stale or failed settlement proposals — sweeps pending flows on a schedule and optionally cancels the related orders."
icon        = "life-buoy"
status      = "active"

required_balance   = "None — read-only"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=failure-recovery"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Settlement Watchdog"
language = "rust"
order    = 1
tags     = ["watchdog", "settlement", "recovery"]
demo     = "https://silvana.one/agents/demo/failure-recovery-settlement-watchdog/"
demo_type = "basic"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-failure-recovery-settlement-watchdog/doc.md"
