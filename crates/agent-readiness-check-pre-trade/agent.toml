schema_version = 1

[category]
slug  = "tx_flow"
order = 3

[agent]
slug        = "readiness-check"
name        = "Readiness Check"
description = "Pre-trade gate — verifies required balances, absence of stuck settlements, and presence of TransferPreapproval contracts. Exits non-zero on any failure so deployment scripts can block on it."
icon        = "circle-check-big"
status      = "active"

required_balance   = "None — read-only"
supported_assets   = "CC, USDC"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=readiness-check"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Pre-Trade"
language = "rust"
order    = 1
tags     = ["gate", "pre-trade"]

[template.resources]
docs       = "https://docs.silvana.one/agents/readiness-check/pre-trade-rust"
demo       = "https://silvana.one/agents/demo/readiness-check-pre-trade/"
