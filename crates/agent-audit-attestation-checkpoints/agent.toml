schema_version = 1

[category]
slug  = "auditing"
order = 3

[agent]
slug        = "audit-attestation"
name        = "Audit Attestation"
description = "Publishes signed checkpoints of a Trading History chain head. Any single checkpoint later proves that earlier records existed at that time — without needing the full log."
icon        = "stamp"
status      = "active"

required_balance   = "None — offline"
supported_assets   = "N/A — signing-only"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=audit-attestation"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Checkpoints"
language = "rust"
order    = 1
tags     = ["audit", "checkpoint", "signed"]
demo     = "https://silvana.one/agents/demo/audit-attestation-checkpoints/"

[template.resources]
docs       = "https://docs.silvana.one/agents/audit-attestation/checkpoints-rust"
