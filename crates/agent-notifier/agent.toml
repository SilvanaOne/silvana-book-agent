schema_version = 1

[category]
slug  = "data_analytics"
order = 4

[agent]
slug        = "notifier"
name        = "Notifier"
description = "Fans out live order, settlement, and price events to any combination of stdout, JSONL file, or HTTP webhook. Each event is a single self-describing JSON record."
icon        = "bell"
status      = "active"

required_balance   = "None — read-only"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=notifier"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Notifier v1"
language = "rust"
order    = 1
tags     = ["events", "webhook", "notify"]

[template.resources]
docs       = "https://docs.silvana.one/agents/notifier/v1-rust"
quickstart = "https://silvana.one/agents/demo/notifier/"
