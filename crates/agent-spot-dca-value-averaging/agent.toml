schema_version = 1

[category]
slug  = "trading"
order = 2

[agent]
slug        = "spot-dca"
name        = "Spot DCA"
description = "Accumulate assets gradually at a lower average cost by placing periodic spot orders on a fixed schedule."
icon        = "calendar-clock"
status      = "active"

required_balance   = "$100 min"
supported_assets   = "CC, USDC"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=spot-dca"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Value Averaging"
language = "rust"
order    = 2
tags     = ["dca", "value-averaging", "dynamic-size"]
demo     = "https://silvana.one/agents/demo/spot-dca-value-averaging/"
demo_type = "basic"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-spot-dca-value-averaging/doc.md"
