schema_version = 1

[category]
slug  = "portfolio_mgmt"
order = 1

[agent]
slug        = "cash-buffer"
name        = "Cash Buffer"
description = "Keep your unlocked Canton Coin balance inside a band — excess is auto-transferred to a sink party, low balance raises a warning."
icon        = "wallet"
status      = "active"

required_balance   = "$50 min"
supported_assets   = "CC"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=cash-buffer"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Push-Only"
language = "rust"
order    = 1
tags     = ["treasury", "transfer-cc"]
demo     = "https://silvana.one/agents/demo/cash-buffer-push-only/"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-cash-buffer-push-only/doc.md"
