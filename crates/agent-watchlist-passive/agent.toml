schema_version = 1

[category]
slug  = "data_analytics"
order = 1

[agent]
slug        = "watchlist"
name        = "Watchlist"
description = "Track markets you care about — streams live prices and orderbook depth for a configurable list of pairs. Read-only, no ledger writes."
icon        = "eye"
status      = "active"

required_balance   = "None — read-only"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=watchlist"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Passive"
language = "rust"
order    = 1
tags     = ["read-only", "market-data"]
demo     = "https://silvana.one/agents/demo/watchlist-passive/"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-watchlist-passive/doc.md"
