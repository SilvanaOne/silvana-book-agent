schema_version = 1

[category]
slug  = "trading"
order = 6

[agent]
slug        = "infinite-grid"
name        = "Infinite Grid"
description = "Grid market-maker with no fixed price range — regenerates a bid/offer ladder around the live mid on every refresh, so the strategy follows the market indefinitely."
icon        = "grid-3x3"
status      = "active"

required_balance   = "$500 min"
supported_assets   = "CC, USDC"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=infinite-grid"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Volatility-Scaled"
language = "rust"
order    = 2
tags     = ["grid", "dynamic", "volatility", "adaptive"]
demo     = "https://silvana.one/agents/demo/infinite-grid-volatility-scaled/"
demo_type = "basic"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-infinite-grid-volatility-scaled/doc.md"
