schema_version = 1

[category]
slug  = "trading"
order = 1

[agent]
slug        = "spot-grid"
name        = "Spot Grid"
description = "Passive market-making grid — stacks bids and offers at fixed levels around the mid and lets price walk through them. No RFQ, no fill loops."
icon        = "grid-3x3"
status      = "active"

required_balance   = "$500 min"
supported_assets   = "CC, USDC"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/contact"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Static"
language = "rust"
order    = 1
tags     = ["marketmaker", "grid"]
demo     = "https://silvana.one/agents/demo/spot-grid-static/"
demo_type = "basic"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-spot-grid-static/doc.md"
