schema_version = 1

[category]
slug  = "trading"
order = 4

[agent]
slug        = "twap"
name        = "TWAP Execution"
description = "Slice a large parent order into equal time-spaced child orders to reduce market impact. Each slice is priced at mid ± offset, optionally clamped by a worst-acceptable limit."
icon        = "clock-fading"
status      = "active"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=twap"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "TWAP v1"
language = "rust"
order    = 1
tags     = ["execution", "time-sliced"]

[template.resources]
docs       = "https://docs.silvana.one/agents/twap/v1-rust"
quickstart = "https://docs.silvana.one/agents/twap/v1-rust/quickstart"
