# HTTPS nginx config внутри arbitrage-gateway.
# Активируется, когда на хосте есть /etc/letsencrypt/live/__ARBITRAGE_DOMAIN__/fullchain.pem
# (тот же том /etc/letsencrypt смонтирован в gateway).
#
# При деплое через host-Traefik TLS заканчивается на самом Traefik;
# этот файл всё равно нужен, если gateway публикуется напрямую на :443
# (fallback / без Traefik).

server {
    listen 80;
    listen [::]:80;
    server_name __ARBITRAGE_DOMAIN__;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name __ARBITRAGE_DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__ARBITRAGE_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__ARBITRAGE_DOMAIN__/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json;

    include /etc/nginx/conf.d/upstream-resolver.conf;

    location /api/events/ {
        set $api_upstream http://api:3000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;
    }

    location /api/ {
        set $api_upstream http://api:3000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        set $web_upstream http://web:3000;
        proxy_pass $web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
