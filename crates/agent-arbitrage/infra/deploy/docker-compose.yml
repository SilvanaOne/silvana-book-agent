# Запуск с корня репозитория:
#   cp infra/deploy/.env.stack.arbitrage.example infra/deploy/.env.stack
#   docker compose --env-file infra/deploy/.env.stack \
#     --project-directory infra/deploy \
#     -f infra/deploy/docker-compose.yml up -d --build
#
# project-directory задаёт базу для volume ./nginx/... относительно infra/deploy.

services:

  postgres:
    image: postgres:16-alpine
    container_name: arbitrage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: arbitrage_agent
    volumes:
      - pgdata_arbitrage_deploy:/var/lib/postgresql/data
    networks:
      - arbitrage-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arbitrage_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: arbitrage-redis
    restart: unless-stopped
    networks:
      - arbitrage-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infra/deploy/Dockerfile.api
    image: arbitrage-agent-api:latest
    container_name: arbitrage-api
    restart: unless-stopped
    env_file:
      - .env.stack
    environment:
      NODE_ENV: production
      PORT: "${API_PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arbitrage-net
    expose:
      - "3000"
    healthcheck:
      test:
        ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  scanner:
    build:
      context: ../..
      dockerfile: infra/deploy/Dockerfile.scanner
    image: arbitrage-agent-scanner:latest
    container_name: arbitrage-scanner
    restart: unless-stopped
    env_file:
      - .env.stack
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arbitrage-net

  web:
    build:
      context: ../..
      dockerfile: infra/deploy/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-}"
        NEXT_PUBLIC_DISABLE_AUTH: "${NEXT_PUBLIC_DISABLE_AUTH:-1}"
    image: arbitrage-agent-web:latest
    container_name: arbitrage-web
    restart: unless-stopped
    env_file:
      - .env.stack
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "${WEB_PORT:-3000}"
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - arbitrage-net
    healthcheck:
      test:
        ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  gateway:
    image: nginx:alpine
    container_name: arbitrage-gateway
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    ports:
      - "${GATEWAY_PUBLISH_HTTP:-80}:80"
      - "${GATEWAY_PUBLISH_HTTPS:-443}:443"
    volumes:
      - ./nginx/arbitrage-site-active.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/upstream-resolver.conf:/etc/nginx/conf.d/upstream-resolver.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - arbitrage-net

networks:
  arbitrage-net:
    driver: bridge

volumes:
  pgdata_arbitrage_deploy:
