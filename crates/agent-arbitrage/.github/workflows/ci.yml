name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proprietary-guard:
    name: Verify no proprietary files committed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for proprietary patterns in tracked files
        run: |
          set -e
          PROPRIETARY_PATTERN='arbitrage-(executor|rebalancer|signer)|silvana-executor|silvana-rebalancer|/rebalancer/|proprietary/|cex-api-secrets|canton-wallet|secret_rsa_keypair'
          FOUND=$(git ls-files | grep -E "$PROPRIETARY_PATTERN" || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Proprietary files committed to open-core repo:"
            echo "$FOUND"
            echo ""
            echo "These files violate the open/proprietary split documented in"
            echo "md_docs/12-component-split-open-vs-proprietary.md."
            echo "Move them to their respective private repos and update .gitignore."
            exit 1
          fi
          echo "OK — no proprietary files in tracked set"

  build:
    name: Build, typecheck, lint, test
    runs-on: ubuntu-latest
    needs: proprietary-guard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
