schema_version = 1

[category]
slug  = "compliance"
order = 7

[agent]
slug        = "human-approval"
name        = "Human Approval"
description = "File-backed approval queue — orders wait for a human sign-off before being signed and submitted; supports approve, reject, purge, and settle workflows."
icon        = "user-check"
status      = "active"

required_balance   = "$100 min"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=human-approval"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Queue"
language = "rust"
order    = 1
tags     = ["approval", "queue", "manual"]
demo     = "https://silvana.one/agents/demo/human-approval-queue/"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-human-approval-queue/doc.md"
