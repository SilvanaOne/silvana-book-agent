schema_version = 1

[category]
slug  = "trading"
order = 2

[agent]
slug        = "spot-dca"
name        = "Spot DCA"
description = "Accumulate assets gradually at a lower average cost by placing periodic spot orders on a fixed schedule."
icon        = "calendar-clock"
status      = "active"

required_balance   = "$100 min"
supported_assets   = "CC, USDC"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=spot-dca"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Spot DCA v1"
language = "rust"
order    = 1
tags     = ["dca", "scheduler"]

[template.resources]
docs       = "https://docs.silvana.one/agents/spot-dca/v1-rust"
quickstart = "https://silvana.one/agents/demo/spot-dca/"
