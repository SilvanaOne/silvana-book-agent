schema_version = 1

[category]
slug  = "portfolio_mgmt"
order = 4

[agent]
slug        = "batch-orders"
name        = "Batch Orders"
description = "One-shot bulk-order CLI — submit orders from a JSONL file, cancel filtered subsets by market or side, or cancel every open order in a single call."
icon        = "layers"
status      = "active"

required_balance   = "$100 min"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=batch-orders"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Batch Orders v1"
language = "rust"
order    = 1
tags     = ["batch", "bulk", "cli"]

[template.resources]
docs       = "https://docs.silvana.one/agents/batch-orders/v1-rust"
quickstart = "https://silvana.one/agents/demo/batch-orders/"
