schema_version = 1

[category]
slug  = "tx_flow"
order = 7

[agent]
slug        = "witnesses"
name        = "Witnesses"
description = "Subscribes to own orders + settlements and spawns a configurable shell command per matched event kind — event context passes to the child via env vars."
icon        = "webhook"
status      = "active"

required_balance   = "None — read-only"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=witnesses"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Shell Hooks"
language = "rust"
order    = 1
tags     = ["events", "shell", "witness"]
demo     = "https://silvana.one/agents/demo/witnesses-shell-hooks/"
demo_type = "basic"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-witnesses-shell-hooks/doc.md"
