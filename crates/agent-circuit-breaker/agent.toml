schema_version = 1

[category]
slug  = "risk"
order = 3

[agent]
slug        = "circuit-breaker"
name        = "Circuit Breaker"
description = "Watches mid-price deviation over a rolling window and auto-cancels every order on the market when the configured threshold trips. Reactivates after a cool-down."
icon        = "zap-off"
status      = "active"

required_balance   = "None — read-only"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=circuit-breaker"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Circuit Breaker v1"
language = "rust"
order    = 1
tags     = ["circuit-breaker", "auto-pause"]

[template.resources]
docs       = "https://docs.silvana.one/agents/circuit-breaker/v1-rust"
demo       = "https://silvana.one/agents/demo/circuit-breaker/"
