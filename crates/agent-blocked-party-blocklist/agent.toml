schema_version = 1

[category]
slug  = "compliance"
order = 2

[agent]
slug        = "blocked-party"
name        = "Blocked Party"
description = "Streams settlement events and flags any proposal whose buyer or seller appears in a plain-text blocklist file. Reloads the blocklist on a configurable interval — no restart required."
icon        = "user-x"
status      = "active"

required_balance   = "None — read-only"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=blocked-party"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Blocklist"
language = "rust"
order    = 1
tags     = ["blocklist", "screening"]
demo     = "https://silvana.one/agents/demo/blocked-party-blocklist/"
demo_type = "basic"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-blocked-party-blocklist/doc.md"
