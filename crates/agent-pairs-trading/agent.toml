schema_version = 1

[category]
slug  = "trading"
order = 11

[agent]
slug        = "pairs-trading"
name        = "Pairs Trading"
description = "Trades two related markets against each other when the price ratio diverges from a target — opposite-direction orders per leg, one live pair at a time."
icon        = "arrow-left-right"
status      = "active"

required_balance   = "$500 min"
supported_assets   = "CC, USDC, CBTC, CETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=pairs-trading"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Pairs Trading v1"
language = "rust"
order    = 1
tags     = ["pairs", "stat-arb", "dual-leg"]

[template.resources]
docs       = "https://docs.silvana.one/agents/pairs-trading/v1-rust"
quickstart = "https://docs.silvana.one/agents/pairs-trading/v1-rust/quickstart"
