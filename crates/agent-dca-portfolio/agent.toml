schema_version = 1

[category]
slug  = "portfolio_mgmt"
order = 2

[agent]
slug        = "dca-portfolio"
name        = "DCA Portfolio"
description = "Runs spot DCA in parallel across a basket of markets — same interval and per-tick amount applied to each market in the configured list."
icon        = "layers"
status      = "active"

required_balance   = "$100 min"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=dca-portfolio"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "DCA Portfolio v1"
language = "rust"
order    = 1
tags     = ["dca", "multi-market"]

[template.resources]
docs       = "https://docs.silvana.one/agents/dca-portfolio/v1-rust"
quickstart = "https://silvana.one/agents/demo/dca-portfolio/"
