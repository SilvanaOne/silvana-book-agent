[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "MACD"
language = "rust"
order    = 2
tags     = ["trend-following", "macd", "momentum"]
demo     = "https://silvana.one/agents/demo/trend-following-macd/"
