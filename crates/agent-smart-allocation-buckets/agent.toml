schema_version = 1

[category]
slug  = "portfolio_mgmt"
order = 5

[agent]
slug        = "smart-allocation"
name        = "Smart Allocation"
description = "Rule-based two-level bucket portfolio — assets grouped into themed buckets with per-bucket target weights and dynamic sub-allocation between instruments."
icon        = "sparkles"
status      = "active"

required_balance   = "$1000 min"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/contact"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Buckets"
language = "rust"
order    = 1
tags     = ["allocation", "buckets", "themes"]
demo     = "https://silvana.one/agents/demo/smart-allocation-buckets/"
demo_type = "basic"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-smart-allocation-buckets/doc.md"
