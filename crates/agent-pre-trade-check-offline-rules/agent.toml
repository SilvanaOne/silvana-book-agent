schema_version = 1

[category]
slug  = "compliance"
order = 1

[agent]
slug        = "pre-trade-check"
name        = "Pre-Trade Check"
description = "Offline rule engine — validates an order (or a stream of orders) against TOML compliance rules: notional, quantity, price band, market and side allow/blocklists. Exits non-zero on reject."
icon        = "shield-check"
status      = "active"

required_balance   = "None — offline"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=pre-trade-check"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Offline Rules"
language = "rust"
order    = 1
tags     = ["rules", "offline", "validator"]
demo     = "https://silvana.one/agents/demo/pre-trade-check-offline-rules/"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-pre-trade-check-offline-rules/doc.md"
