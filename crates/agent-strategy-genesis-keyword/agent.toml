schema_version = 1

[category]
slug  = "intelligence"
order = 3

[agent]
slug        = "strategy-genesis"
name        = "Strategy Genesis"
description = "Chat-to-Strategy compiler: a short natural-language execution spec (`buy 100 CC-USDC over 1 hour with TWAP`) is translated into a valid TOML plan for agent-algo-order. Deterministic keyword parser here; swap in an LLM behind the same interface in prod."
icon        = "wand"
status      = "active"

required_balance   = "None — offline"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=strategy-genesis"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Keyword"
language = "rust"
order    = 1
tags     = ["chat-to-strategy", "nlp", "codegen"]
demo     = "https://silvana.one/agents/demo/strategy-genesis-keyword/"
demo_type = "basic"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-strategy-genesis-keyword/doc.md"
