schema_version = 1

[category]
slug  = "trading"
order = 9

[agent]
slug        = "inventory-mgmt"
name        = "Inventory Management"
description = "Keeps the unlocked balance of a chosen instrument inside a target band by placing market-driven rebalance orders — sibling of Cash Buffer for tradable inventory."
icon        = "package"
status      = "active"

required_balance   = "$100 min"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=inventory-mgmt"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Band"
language = "rust"
order    = 1
tags     = ["inventory", "rebalance"]
demo     = "https://silvana.one/agents/demo/inventory-mgmt-band/"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-inventory-mgmt-band/doc.md"
