schema_version = 1

[category]
slug  = "portfolio_mgmt"
order = 4

[agent]
slug        = "portfolio-health"
name        = "Portfolio Health"
description = "Human-readable snapshot — balances per instrument, open orders aggregated by market and side, pending settlement notional, and optional mid-price valuation of net inventory."
icon        = "heart-pulse"
status      = "active"

required_balance   = "None — read-only"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=portfolio-health"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Snapshot"
language = "rust"
order    = 1
tags     = ["report", "exposure"]
demo     = "https://silvana.one/agents/demo/portfolio-health-snapshot/"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-portfolio-health-snapshot/doc.md"
