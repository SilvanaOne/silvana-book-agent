schema_version = 1

[category]
slug  = "risk"
order = 3

[agent]
slug        = "fair-value"
name        = "Fair Value"
description = "Multi-source reference price — polls every configured upstream (binance, bybit, coingecko, …) for each market and aggregates with median, mean, or trimmed-mean."
icon        = "scale-3d"
status      = "active"

required_balance   = "None — read-only"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=fair-value"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Multi-Source"
language = "rust"
order    = 1
tags     = ["aggregation", "reference-price"]

[template.resources]
docs       = "https://docs.silvana.one/agents/fair-value/multi-source-rust"
demo       = "https://silvana.one/agents/demo/fair-value-multi-source/"
