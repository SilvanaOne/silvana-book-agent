schema_version = 1

[category]
slug  = "trading"
order = 12

[agent]
slug        = "algo-order"
name        = "Algo Order"
description = "Generic algorithmic order dispatcher with pluggable execution strategies (TWAP, iceberg, participation-rate) selected per parent order."
icon        = "workflow"
status      = "active"

required_balance   = "$500 min"
supported_assets   = "CC, USDC, cETH"
supported_projects = "Silvana"

[[agent.cta]]
label = "Order Agent"
url   = "https://silvana.one/order-agent?ref=algo-order"

[[agent.cta]]
label = "Contact Us"
url   = "https://silvana.one/contact"

[template]
name     = "Dispatcher"
language = "rust"
order    = 1
tags     = ["algo", "execution", "dispatcher"]
demo     = "https://silvana.one/agents/demo/algo-order-dispatcher/"

[template.resources]
docs       = "https://github.com/SilvanaOne/silvana-book-agent/blob/new-agents/crates/agent-algo-order-dispatcher/doc.md"
