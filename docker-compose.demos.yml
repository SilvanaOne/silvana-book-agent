# Umbrella compose file that runs every agent demo at once.
#
# TWO modes controlled by DEMO_TAG env var:
#
#   Prod (default) — pull pre-built images from GHCR:
#       docker compose -f docker-compose.demos.yml pull
#       docker compose -f docker-compose.demos.yml up -d
#
#   Local dev — build images from source:
#       docker compose -f docker-compose.demos.yml -f docker-compose.demos.dev.yml up -d --build
#
# Add a new service here whenever you build a new demo. Each service maps
# to `crates/agent-<name>/demo/Dockerfile`, exposes its dedicated port, and
# restarts automatically.
#
# Behind a reverse proxy (Caddy / Nginx) on the host, map subdomains to the
# host ports (e.g. tpsl.spcatcher.cfd → 127.0.0.1:3002).

x-image-owner: &owner ghcr.io/silvanaone

services:
  tpsl-demo:
    image: ${TPSL_IMAGE:-ghcr.io/silvanaone/tpsl-demo:${DEMO_TAG:-latest}}
    build:
      context: ./crates/agent-tpsl/demo
    container_name: tpsl-demo
    restart: unless-stopped
    ports:
      - "3002:3002"

  spot-dca-demo:
    image: ${DCA_IMAGE:-ghcr.io/silvanaone/spot-dca-demo:${DEMO_TAG:-latest}}
    build:
      context: ./crates/agent-spot-dca/demo
    container_name: spot-dca-demo
    restart: unless-stopped
    ports:
      - "3003:3003"
