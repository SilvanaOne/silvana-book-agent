name: build-demos

on:
  push:
    branches: [new-agents, main]
    paths:
      - "crates/agent-tpsl/demo/**"
      - "crates/agent-spot-dca/demo/**"
      - ".github/workflows/demos.yml"
      - "docker-compose.demos.yml"
  pull_request:
    paths:
      - "crates/agent-tpsl/demo/**"
      - "crates/agent-spot-dca/demo/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: tpsl-demo
            context: crates/agent-tpsl/demo
          - name: spot-dca-demo
            context: crates/agent-spot-dca/demo
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        id: owner
        run: echo "value=$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/new-agents' }}

      - name: Build (validate on PR, push otherwise)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Roll the freshly-built images onto the host. Runs only after both images
  # built + pushed successfully (needs: build), and only on a real push to
  # new-agents — never on PRs (which don't push images) or forks.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/new-agents'
    concurrency:
      group: deploy-demos
      cancel-in-progress: false
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          GIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: GIT_SHA
          script: |
            set -euo pipefail
            cd /opt/silvana-book-agent
            git fetch --all --prune
            git checkout new-agents
            git pull --ff-only
            # metadata-action's type=sha tag is the 7-char short SHA — match it
            # exactly so we deploy precisely the image this run built.
            TAG="sha-$(echo "$GIT_SHA" | cut -c1-7)"
            bash scripts/deploy-demos.sh "$TAG"
