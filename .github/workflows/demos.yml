name: build-demos

on:
  push:
    branches: [new-agents, main]
    paths:
      - "crates/agent-tpsl/demo/**"
      - "crates/agent-spot-dca/demo/**"
      - ".github/workflows/demos.yml"
      - "docker-compose.demos.yml"
  pull_request:
    paths:
      - "crates/agent-tpsl/demo/**"
      - "crates/agent-spot-dca/demo/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # Detect which demo actually changed so we only rebuild that one. A change to
  # the workflow or the compose file rebuilds both. workflow_dispatch forces both
  # (handled by the `if` on the build steps below).
  changes:
    runs-on: ubuntu-latest
    outputs:
      tpsl: ${{ steps.filter.outputs.tpsl }}
      dca: ${{ steps.filter.outputs.dca }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            tpsl:
              - 'crates/agent-tpsl/demo/**'
              - '.github/workflows/demos.yml'
              - 'docker-compose.demos.yml'
            dca:
              - 'crates/agent-spot-dca/demo/**'
              - '.github/workflows/demos.yml'
              - 'docker-compose.demos.yml'

  build:
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: tpsl-demo
            context: crates/agent-tpsl/demo
            changed: ${{ needs.changes.outputs.tpsl }}
          - name: spot-dca-demo
            context: crates/agent-spot-dca/demo
            changed: ${{ needs.changes.outputs.dca }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Skip note
        if: matrix.changed != 'true' && github.event_name != 'workflow_dispatch'
        run: echo "No changes for ${{ matrix.name }} — skipping build (cached image kept)."

      - name: Checkout
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: (matrix.changed == 'true' || github.event_name == 'workflow_dispatch') && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        id: owner
        run: echo "value=$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/new-agents' }}

      # Layer cache lives in GitHub Actions cache (type=gha): unchanged layers are
      # reused, so even a forced rebuild is fast. push only on branch pushes.
      - name: Build (validate on PR, push otherwise)
        if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Roll the freshly-built images onto the host. Runs only after the build job
  # finishes, and only on a real push to new-agents — never on PRs (which don't
  # push images) or forks. Copies the compose file + deploy script to the host
  # via scp (no git-on-server needed), then runs the roll through the bastion.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/new-agents'
    concurrency:
      group: deploy-demos
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file + deploy script to host
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          proxy_host: ${{ secrets.SSH_PROXY_HOST }}
          proxy_username: ${{ secrets.SSH_PROXY_USER }}
          proxy_key: ${{ secrets.SSH_KEY }}
          proxy_port: ${{ secrets.SSH_PROXY_PORT }}
          source: "docker-compose.demos.yml,scripts/deploy-demos.sh"
          target: /opt/silvana-book-agent
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          proxy_host: ${{ secrets.SSH_PROXY_HOST }}
          proxy_username: ${{ secrets.SSH_PROXY_USER }}
          proxy_key: ${{ secrets.SSH_KEY }}
          proxy_port: ${{ secrets.SSH_PROXY_PORT }}
          script: |
            set -euo pipefail
            cd /opt/silvana-book-agent
            # Deploy the mutable `latest` tag: only the demo that was actually
            # rebuilt this run has a new `latest`, so `deploy-demos.sh` restarts
            # just that container and leaves the unchanged one running.
            bash scripts/deploy-demos.sh latest
