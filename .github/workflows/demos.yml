name: build-demos

on:
  push:
    branches: [new-agents, main]
    paths:
      - "crates/*/demo/**"
      - ".github/workflows/demos.yml"
      - "scripts/discover-demos.sh"
      - "scripts/gen-demos-compose.sh"
      - "scripts/deploy-demos.sh"
  pull_request:
    paths:
      - "crates/*/demo/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # Auto-discover every demo (crates/*/demo/Dockerfile) and decide which ones
  # this push actually changed. Output is a dynamic build matrix — no demo is
  # ever listed by hand here or in the compose file.
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      any: ${{ steps.detect.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history to diff the push range
      - name: Discover demos and select changed
        id: detect
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          OWNER: ${{ github.repository_owner }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GIT_TOKEN_RP }}
        run: |
          set -euo pipefail
          ALL="$(bash scripts/discover-demos.sh)"
          echo "All demos: $ALL"

          # Force-build-all cases: manual run, or a first push with no "before".
          FORCE=0
          RANGE=""
          if [ "$EVENT" = "workflow_dispatch" ]; then
            FORCE=1
          elif [ "$EVENT" = "pull_request" ]; then
            RANGE="${PR_BASE}...${PR_HEAD}"
          else
            if [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              FORCE=1
            else
              RANGE="${BEFORE} ${SHA}"
            fi
          fi

          if [ "$FORCE" = "1" ]; then
            echo "Force-building all demos."
            KEEP="$(echo "$ALL" | jq -r '.[].name')"
          else
            # (a) demos whose files changed in this push
            CHANGED="$(git diff --name-only $RANGE || true)"
            echo "Changed files:"; echo "$CHANGED"
            KEEP="$(echo "$ALL" | jq -r --arg files "$CHANGED" '
              ($files | split("\n") | map(select(length > 0))) as $f
              | .[] | select(.context as $c | ($f | any(startswith($c + "/")))) | .name')"

            # (b) PLUS demos whose :latest image is missing in GHCR — i.e. newly
            # added or renamed demos that were never published under this name.
            # Without this, a rename that isn't touched again never gets built.
            owner_lc="$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin >/dev/null 2>&1 || true
              while read -r name; do
                if ! docker manifest inspect "ghcr.io/${owner_lc}/${name}:latest" >/dev/null 2>&1; then
                  echo "  not in registry → will build: ${name}"
                  KEEP="${KEEP}"$'\n'"${name}"
                fi
              done < <(echo "$ALL" | jq -r '.[].name')
              docker logout ghcr.io >/dev/null 2>&1 || true
            else
              echo "WARN: GIT_TOKEN_RP not set — skipping registry existence check."
            fi
          fi

          # Unique names → filter ALL down to the selected demo objects.
          KEEP_JSON="$(printf '%s\n' "$KEEP" | sed '/^$/d' | sort -u | jq -R . | jq -s -c .)"
          SEL="$(echo "$ALL" | jq -c --argjson keep "$KEEP_JSON" \
            'map(select(.name as $n | $keep | index($n)))')"

          COUNT="$(echo "$SEL" | jq 'length')"
          echo "Selected $COUNT demo(s): $SEL"
          echo "matrix={\"include\":$SEL}" >> "$GITHUB_OUTPUT"
          [ "$COUNT" -gt 0 ] && echo "any=true" >> "$GITHUB_OUTPUT" || echo "any=false" >> "$GITHUB_OUTPUT"

  # Build + push only the demos the discover job selected. Matrix is dynamic.
  build:
    needs: discover
    if: needs.discover.outputs.any == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        id: owner
        run: echo "value=$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/new-agents' }}

      # Layer cache lives in the GitHub Actions cache (type=gha): unchanged
      # layers are reused, so rebuilds are fast. push only on branch pushes.
      - name: Build (validate on PR, push otherwise)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Roll onto the host. Regenerates the compose file from ALL discovered demos
  # (so newly added demos appear and deleted ones are removed via
  # --remove-orphans), copies it + the deploy script over scp through the
  # bastion, and pulls/rolls.
  #
  # Gate: never deploy if ANY previous phase errored or the run was cancelled.
  # `!failure() && !cancelled()` blocks on discover/build failure (incl. a single
  # failed build leg, since fail-fast:false still marks the job failed) but still
  # allows the "build was skipped — nothing to build" case through, so the host
  # is reconciled on a clean run.
  deploy:
    needs: [discover, build]
    if: >-
      !failure() && !cancelled()
      && github.event_name == 'push'
      && github.ref == 'refs/heads/new-agents'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    concurrency:
      group: deploy-demos
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate compose from discovered demos
        env:
          IMAGE_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          owner_lc="$(echo "$IMAGE_OWNER" | tr '[:upper:]' '[:lower:]')"
          IMAGE_OWNER="$owner_lc" bash scripts/gen-demos-compose.sh > docker-compose.demos.yml
          echo "Generated docker-compose.demos.yml:"; cat docker-compose.demos.yml

      - name: Copy compose file + deploy script to host
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          proxy_host: ${{ secrets.SSH_PROXY_HOST }}
          proxy_username: ${{ secrets.SSH_PROXY_USER }}
          proxy_key: ${{ secrets.SSH_KEY }}
          proxy_port: ${{ secrets.SSH_PROXY_PORT }}
          source: "docker-compose.demos.yml,scripts/deploy-demos.sh"
          target: /opt/silvana-book-agent
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GIT_TOKEN_RP }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          proxy_host: ${{ secrets.SSH_PROXY_HOST }}
          proxy_username: ${{ secrets.SSH_PROXY_USER }}
          proxy_key: ${{ secrets.SSH_KEY }}
          proxy_port: ${{ secrets.SSH_PROXY_PORT }}
          envs: GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail
            if [ -z "${GHCR_TOKEN:-}" ]; then
              echo "ERROR: GHCR token is empty. Set the GIT_TOKEN_RP repo secret" >&2
              echo "       to a PAT with 'read:packages', then re-run." >&2
              exit 1
            fi
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /opt/silvana-book-agent
            # `latest` roll: only demos rebuilt this run moved their latest, so
            # deploy-demos.sh restarts just those and leaves the rest running.
            bash scripts/deploy-demos.sh latest
            docker logout ghcr.io || true
